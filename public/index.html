<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HandicapAI — Live Predictions</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c12;--surface:#0e1420;--card:#131925;--border:#1e2a3a;--accent:#00e5a0;--accent2:#ff6b35;--gold:#ffc837;--text:#e8edf5;--muted:#5a6a80;--win:#00e5a0;--lose:#ff4757;--pending:#ffc837}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(0,229,160,.06) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 90% 80%,rgba(37,99,235,.07) 0%,transparent 50%);pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:100;background:rgba(8,12,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px}
.header-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),#00b4d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{-webkit-text-fill-color:var(--text)}
.header-right{display:flex;gap:8px;align-items:center}
.last-updated{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.hbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative}
.hbtn.accent{color:var(--accent)}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);display:none}
.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;position:relative;z-index:1}
.stats-bar-inner{max-width:480px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-pill{text-align:center;padding:8px 4px;border-radius:10px;background:var(--card);border:1px solid var(--border)}
.stat-pill .val{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1}
.val.green{color:var(--accent)}.val.gold{color:var(--gold)}.val.blue{color:#60a5fa}.val.orange{color:var(--accent2)}
.stat-pill .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.tabs-wrap{padding:12px 16px 0;position:relative;z-index:1}
.tabs{max-width:480px;margin:0 auto;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.filter-bar{padding:10px 16px;position:relative;z-index:1}
.filter-bar-inner{max-width:480px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.filter-bar-inner::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;transition:all .2s}
.filter-chip.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,.08)}
.filter-chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.section-label{max-width:480px;margin:0 auto 10px;display:flex;align-items:center;gap:8px;padding:0 16px}
.section-label .line{flex:1;height:1px;background:var(--border)}
.section-label span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
main{padding:0 16px 100px;position:relative;z-index:1}
.card{max-width:480px;margin:0 auto 12px;border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--card);position:relative;transition:transform .15s;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card:active{transform:scale(.985)}
.card.banker{border-color:rgba(255,200,55,.4);background:linear-gradient(145deg,#161d2a,#1a1f2e)}
.card.banker::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),#ff9f43,var(--gold));background-size:200%;animation:shimmer 2s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.card-head{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.league-badge{display:flex;align-items:center;gap:6px}
.league-name{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.card-badges{display:flex;gap:5px;align-items:center}
.badge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.badge.banker-badge{background:rgba(255,200,55,.15);color:var(--gold);border:1px solid rgba(255,200,55,.3)}
.badge.bookie{background:rgba(37,99,235,.12);color:#60a5fa;border:1px solid rgba(37,99,235,.2);font-family:'DM Sans',sans-serif;font-size:9px}
.badge.win{background:rgba(0,229,160,.1);color:var(--win);border:1px solid rgba(0,229,160,.2)}
.badge.loss{background:rgba(255,71,87,.1);color:var(--lose);border:1px solid rgba(255,71,87,.2)}
.badge.pending{background:rgba(255,200,55,.1);color:var(--pending);border:1px solid rgba(255,200,55,.2)}
.match-body{padding:4px 14px 12px}
.teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.team{flex:1;text-align:center}
.team-name{font-size:13px;font-weight:600;line-height:1.3}
.team-form{display:flex;gap:3px;justify-content:center;margin-top:5px}
.fd{width:7px;height:7px;border-radius:50%}
.fd.W{background:var(--win)}.fd.D{background:var(--muted)}.fd.L{background:var(--lose)}
.vs-block{text-align:center;flex-shrink:0;padding:0 10px}
.vs-text{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);line-height:1}
.match-time{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.pick-row{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.pick-left{display:flex;flex-direction:column;gap:3px}
.pick-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.pick-value{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px;line-height:1}
.card.banker .pick-value{color:var(--gold)}
.prob-ring{width:52px;height:52px;position:relative;display:flex;align-items:center;justify-content:center}
.prob-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.prob-inner{text-align:center;position:relative;z-index:1}
.prob-num{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text);line-height:1}
.prob-pct{font-size:8px;color:var(--muted)}
.card-footer{padding:8px 14px 12px;display:flex;gap:6px;flex-wrap:wrap}
.itag{padding:4px 8px;border-radius:6px;font-size:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted)}
.itag.hot{background:rgba(255,107,53,.08);color:var(--accent2);border-color:rgba(255,107,53,.2)}
.skeleton{background:var(--card);border:1px solid var(--border);border-radius:16px;height:160px;max-width:480px;margin:0 auto 12px;position:relative;overflow:hidden}
.skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:sk 1.5s infinite}
@keyframes sk{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.empty-state{max-width:480px;margin:40px auto;text-align:center;padding:32px 20px}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--muted);letter-spacing:1px}
.empty-sub{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5}
.seed-btn{margin-top:20px;padding:12px 24px;border-radius:12px;background:var(--accent);color:#000;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;display:block;width:100%;max-width:300px;margin:20px auto 0}
.ana-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ana-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.ana-title{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}
.ana-big{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);line-height:1}
.ana-sub{font-size:11px;color:var(--muted);margin-top:3px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:10px;color:var(--muted);width:70px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 1s}
.bar-val{font-size:10px;color:var(--text);font-family:'JetBrains Mono',monospace;width:32px;text-align:right;flex-shrink:0}
.history-item{max-width:480px;margin:0 auto 8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;animation:fadeUp .3s ease}
.hres{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.hres.win{background:rgba(0,229,160,.12);color:var(--win)}
.hres.loss{background:rgba(255,71,87,.12);color:var(--lose)}
.hinfo{flex:1;min-width:0}
.hmatch{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hsub{font-size:10px;color:var(--muted);margin-top:2px}
.hpick{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);text-align:right;flex-shrink:0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:13px;opacity:0;transition:all .3s;z-index:200;max-width:calc(100vw - 32px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(14,20,32,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--muted);transition:color .2s;border:none;background:none}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px}.nav-label{font-size:10px;font-weight:500;font-family:'DM Sans',sans-serif}
.date-badge{display:inline-block;padding:4px 12px;border-radius:20px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.2);color:var(--accent);font-size:11px;font-weight:600;margin:0 auto 12px;display:block;text-align:center;max-width:200px}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Handicap<span>AI</span></div>
    <div class="header-right">
      <span class="last-updated" id="lu">--:--</span>
      <button class="hbtn accent" id="rbtn" onclick="loadPredictions(true)">↻</button>
      <button class="hbtn" onclick="showToast('🔔 Notifications on!')">🔔<div class="notif-dot" id="ndot"></div></button>
      <button class="hbtn" onclick="openCfg()">⚙️</button>
    </div>
  </div>
</header>

<div class="stats-bar">
  <div class="stats-bar-inner">
    <div class="stat-pill"><div class="val green" id="st-today">0</div><div class="lbl">Today</div></div>
    <div class="stat-pill"><div class="val gold" id="st-bank">0</div><div class="lbl">Bankers</div></div>
    <div class="stat-pill"><div class="val blue" id="st-wr">0%</div><div class="lbl">Win Rate</div></div>
    <div class="stat-pill"><div class="val orange" id="st-ap">0%</div><div class="lbl">Avg Prob</div></div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab" onclick="setDay('yesterday',this)">⬅ Yesterday</button>
    <button class="tab active" onclick="setDay('today',this)">⚽ Today</button>
    <button class="tab" onclick="setDay('tomorrow',this)">📅 Tomorrow</button>
    <button class="tab" onclick="setView('bankers',this)">⭐ Bankers</button>
    <button class="tab" onclick="setView('analytics',this)">📊 Analytics</button>
    <button class="tab" onclick="setView('history',this)">📋 History</button>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-bar-inner">
    <button class="filter-chip on" data-lg="all" onclick="setLeague('all',this)"><div class="dot"></div>All</button>
    <button class="filter-chip" data-lg="Premier League" onclick="setLeague('Premier League',this)"><div class="dot"></div>PL 🏴󠁧󠁢󠁥󠁮󠁧󠁿</button>
    <button class="filter-chip" data-lg="La Liga" onclick="setLeague('La Liga',this)"><div class="dot"></div>LaLiga 🇪🇸</button>
    <button class="filter-chip" data-lg="Serie A" onclick="setLeague('Serie A',this)"><div class="dot"></div>Serie A 🇮🇹</button>
    <button class="filter-chip" data-lg="Bundesliga" onclick="setLeague('Bundesliga',this)"><div class="dot"></div>Bund. 🇩🇪</button>
    <button class="filter-chip" data-lg="Ligue 1" onclick="setLeague('Ligue 1',this)"><div class="dot"></div>Ligue1 🇫🇷</button>
    <button class="filter-chip" data-lg="Champions League" onclick="setLeague('Champions League',this)"><div class="dot"></div>UCL 🏆</button>
    <button class="filter-chip" data-lg="Europa League" onclick="setLeague('Europa League',this)"><div class="dot"></div>UEL 🟠</button>
    <button class="filter-chip" data-lg="Conference League" onclick="setLeague('Conference League',this)"><div class="dot"></div>UECL 🟣</button>
  </div>
</div>

<main>
  <div id="pane-picks">
    <div id="date-label" class="date-badge">Today</div>
    <div id="picks-container"></div>
  </div>

  <div id="pane-analytics" style="display:none">
    <div class="ana-grid">
      <div class="ana-card"><div class="ana-title">Win Rate</div><div class="ana-big" id="a-wr">--%</div><div class="ana-sub">All Time</div></div>
      <div class="ana-card"><div class="ana-title">Banker Rate</div><div class="ana-big" style="color:var(--gold)" id="a-br">--%</div><div class="ana-sub" id="a-bt">-- bankers</div></div>
    </div>
    <div class="ana-card" style="margin-top:10px">
      <div class="ana-title">Win Rate by League</div>
      <div id="a-leagues" style="margin-top:8px"></div>
    </div>
    <div class="ana-grid" style="margin-top:10px">
      <div class="ana-card"><div class="ana-title">Total Picks</div><div class="ana-big" style="color:#60a5fa" id="a-total">--</div><div class="ana-sub">All Time</div></div>
      <div class="ana-card"><div class="ana-title">Streak</div><div class="ana-big" style="color:var(--accent2)" id="a-streak">--</div><div class="ana-sub">Current</div></div>
    </div>
  </div>

  <div id="pane-history" style="display:none">
    <div id="history-container"></div>
  </div>
</main>

<div class="toast" id="toast"><span id="tmsg">Done!</span></div>

<div class="bottom-nav">
  <button class="nav-item" onclick="setDay('yesterday',null,this)"><div class="nav-icon">⬅</div><div class="nav-label">Yesterday</div></button>
  <button class="nav-item active" onclick="setDay('today',null,this)"><div class="nav-icon">⚽</div><div class="nav-label">Today</div></button>
  <button class="nav-item" onclick="setDay('tomorrow',null,this)"><div class="nav-icon">📅</div><div class="nav-label">Tomorrow</div></button>
  <button class="nav-item" onclick="setView('analytics',null,this)"><div class="nav-icon">📊</div><div class="nav-label">Analytics</div></button>
  <button class="nav-item" onclick="setView('history',null,this)"><div class="nav-icon">📋</div><div class="nav-label">History</div></button>
</div>

<script>
const BACKEND = localStorage.getItem('backend') || (location.origin.includes('localhost') ? 'http://localhost:3000' : location.origin);
const S = { day: 'today', league: 'all', view: 'picks' };

async function api(path) {
  const r = await fetch(BACKEND + path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function getDate(offset=0) {
  return new Date(Date.now() + offset*86400000).toISOString().split('T')[0];
}

// ── LOAD PICKS ──────────────────────────────────────────────
async function loadPredictions(manual=false) {
  const btn = document.getElementById('rbtn');
  btn.classList.add('spinning');
  const container = document.getElementById('picks-container');
  container.innerHTML = [1,2,3].map(()=>'<div class="skeleton"></div>').join('');

  const offset = S.day === 'yesterday' ? -1 : S.day === 'tomorrow' ? 1 : S.day === 'dayafter' ? 2 : 0;
  const date = getDate(offset);
  const dayLabel = S.day === 'yesterday'
    ? '⬅ Yesterday — ' + new Date(Date.now()-86400000).toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'})
    : S.day === 'today'
    ? '📅 Today — ' + new Date().toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'})
    : S.day === 'tomorrow'
    ? '📅 Tomorrow — ' + new Date(Date.now()+86400000).toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'})
    : '📅 ' + date;
  document.getElementById('date-label').textContent = dayLabel;

  try {
    const qs = new URLSearchParams({ date, league: S.league, min_prob: 70 });
    const data = await api('/api/predictions?' + qs);
    renderPicks(data.predictions || [], container);
    document.getElementById('lu').textContent = 'Live · ' + new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    if (manual) showToast('✅ Refreshed!');
    // show notif dot if bankers
    const bk = (data.predictions||[]).filter(p=>p.is_banker);
    if (bk.length) { document.getElementById('ndot').style.display='block'; }
  } catch(e) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-title">No Predictions Yet</div><div class="empty-sub">Tap below to load today's picks</div><button class="seed-btn" onclick="seedData()">🤖 Load Predictions</button></div>`;
    document.getElementById('lu').textContent = 'Offline';
  }
  await loadStats();
  btn.classList.remove('spinning');
}

function renderPicks(preds, container) {
  const dayName = S.day === 'yesterday' ? 'Yesterday' : S.day === 'today' ? 'Today' : 'Tomorrow';
  if (!preds.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No Picks ${dayName}</div><div class="empty-sub">${S.day === 'yesterday' ? 'No predictions were recorded for yesterday.' : 'Tap below to load predictions'}</div>${S.day !== 'yesterday' ? `<button class="seed-btn" onclick="seedData()">🤖 Load Predictions</button>` : ''}</div>`;
    return;
  }
  const bankers = preds.filter(p=>p.is_banker);
  const regular = preds.filter(p=>!p.is_banker);
  let html = '';
  if (bankers.length) {
    html += `<div class="section-label"><div class="line"></div><span>⭐ Banker Picks</span><div class="line"></div></div>`;
    html += bankers.map(cardHTML).join('');
  }
  if (regular.length) {
    html += `<div class="section-label"><div class="line"></div><span>High Probability Picks</span><div class="line"></div></div>`;
    html += regular.map(cardHTML).join('');
  }
  container.innerHTML = html;
}

function cardHTML(p) {
  const ins = Array.isArray(p.insights) ? p.insights : [];
  const hf = (p.home_form||'WWDLW').split('').slice(0,5);
  const af = (p.away_form||'LWLLL').split('').slice(0,5);
  const prob = p.probability||75;
  const C = 138.2;
  const off = C - (prob/100)*C;
  const col = p.is_banker ? '#ffc837' : '#00e5a0';
  const sb = p.status==='win' ? '<span class="badge win">WIN ✓</span>' : p.status==='loss' ? '<span class="badge loss">LOSS ✗</span>' : '<span class="badge pending">PENDING</span>';
  const bk = p.is_banker ? '<span class="badge banker-badge">⭐ BANKER</span>' : '';
  const sub = p.status!=='pending' && p.home_score!=null ? `${p.home_score}-${p.away_score} ${p.status==='win'?'✓':'✗'}` : p.win_condition||'';
  return `<div class="card ${p.is_banker?'banker':''}">
  <div class="card-head">
    <div class="league-badge"><span style="font-size:14px">${p.league_flag||'⚽'}</span><span class="league-name">${p.league}</span></div>
    <div class="card-badges"><span class="badge bookie">${p.bookmaker||'Bet9ja'}</span>${bk}${sb}</div>
  </div>
  <div class="match-body">
    <div class="teams">
      <div class="team"><div class="team-name">${p.home_team}</div><div class="team-form" title="Recent form — left is most recent">${hf.map(f=>`<div class="fd ${f}"></div>`).join('')}<span style="font-size:9px;color:var(--muted);margin-left:3px">←new</span></div></div>
      <div class="vs-block"><div class="vs-text">VS</div><div class="match-time">${p.match_time||'--:--'}</div></div>
      <div class="team"><div class="team-name">${p.away_team}</div><div class="team-form" title="Recent form — left is most recent">${af.map(f=>`<div class="fd ${f}"></div>`).join('')}<span style="font-size:9px;color:var(--muted);margin-left:3px">←new</span></div></div>
    </div>
    <div class="pick-row">
      <div class="pick-left">
        <div class="pick-label">Selected Pick</div>
        <div class="pick-value">${p.handicap_label||p.favorite+' '+p.handicap}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${sub}</div>
      </div>
      <div class="prob-ring">
        <svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="22" fill="none" stroke="#1e2a3a" stroke-width="4"/><circle cx="26" cy="26" r="22" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${C}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>
        <div class="prob-inner"><div class="prob-num">${prob}%</div><div class="prob-pct">PROB</div></div>
      </div>
    </div>
    ${p.writeup ? `<div style="margin:8px 0 0;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text);line-height:1.6;border-left:3px solid ${p.is_banker?'var(--gold)':'var(--accent)'}"><span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px">📝 AI Analysis</span>${p.writeup}</div>` : ''}
  </div>
  <div class="card-footer">
    ${ins.map((t,i)=>`<span class="itag ${i===0?'hot':''}">${t}</span>`).join('')}
    ${p.h2h_summary?`<span class="itag">${p.h2h_summary}</span>`:''}
    ${p.odds?`<span class="itag">Odds: ${Number(p.odds).toFixed(2)}</span>`:''}
  </div>
</div>`;
}

// ── STATS ────────────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await api('/api/stats');
    document.getElementById('st-today').textContent = s.today_picks;
    document.getElementById('st-bank').textContent = s.today_bankers;
    document.getElementById('st-wr').textContent = s.win_rate + '%';
    document.getElementById('st-ap').textContent = s.avg_prob + '%';
    document.getElementById('a-wr').textContent = s.win_rate + '%';
    document.getElementById('a-total').textContent = s.total_predictions;
  } catch(e){}
}

// ── ANALYTICS ────────────────────────────────────────────────
async function loadAnalytics() {
  try {
    const d = await api('/api/analytics');
    document.getElementById('a-br').textContent = (d.banker_rate||0) + '%';
    document.getElementById('a-bt').textContent = (d.banker_total||0) + ' bankers';
    document.getElementById('a-streak').textContent = (d.streak?.count||0) + (d.streak?.type==='win'?'W':'L');
    const el = document.getElementById('a-leagues');
    if (d.by_league?.length) {
      el.innerHTML = d.by_league.map(l=>`<div class="bar-row"><div class="bar-label">${l.league_flag||''} ${l.league}</div><div class="bar-track"><div class="bar-fill" style="width:${l.win_rate}%"></div></div><div class="bar-val">${l.win_rate}%</div></div>`).join('');
    } else { el.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px">No data yet</div>'; }
  } catch(e){}
}

// ── HISTORY ──────────────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('history-container');
  el.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
  try {
    const d = await api('/api/history?limit=30');
    if (!d.history?.length) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No History Yet</div><div class="empty-sub">Results appear after matches complete.</div></div>`; return; }
    el.innerHTML = d.history.map(p=>`<div class="history-item"><div class="hres ${p.status}">${p.status==='win'?'W':'L'}</div><div class="hinfo"><div class="hmatch">${p.home_team} vs ${p.away_team}</div><div class="hsub">${p.date} · ${p.league}${p.is_banker?' · ⭐':''}</div></div><div class="hpick">${p.handicap_label}<br><span style="color:var(--muted);font-size:9px">${p.probability}%</span></div></div>`).join('');
  } catch(e) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No History</div></div>`; }
}

// ── SEED ─────────────────────────────────────────────────────
async function seedData() {
  showToast('⏳ Loading predictions...');
  try {
    await fetch(BACKEND + '/api/seed');
    setTimeout(() => loadPredictions(), 1000);
  } catch(e) { showToast('❌ Cannot reach server'); }
}

// ── NAV ──────────────────────────────────────────────────────
function setDay(day, tabBtn, navBtn) {
  S.day = day; S.view = 'picks';
  if (tabBtn) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); tabBtn.classList.add('active'); }
  if (navBtn) { document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); navBtn.classList.add('active'); }
  document.getElementById('pane-picks').style.display = '';
  document.getElementById('pane-analytics').style.display = 'none';
  document.getElementById('pane-history').style.display = 'none';
  loadPredictions();
}

function setView(view, tabBtn, navBtn) {
  S.view = view;
  if (tabBtn) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); tabBtn.classList.add('active'); }
  if (navBtn) { document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); navBtn.classList.add('active'); }
  document.getElementById('pane-picks').style.display = view==='picks'?'':'none';
  document.getElementById('pane-analytics').style.display = view==='analytics'?'':'none';
  document.getElementById('pane-history').style.display = view==='history'?'':'none';
  if (view==='analytics') loadAnalytics();
  if (view==='history') loadHistory();
}

function setLeague(lg, chip) {
  S.league = lg;
  document.querySelectorAll('[data-lg]').forEach(c=>c.classList.remove('on'));
  chip.classList.add('on');
  loadPredictions();
}

function showToast(msg) {
  document.getElementById('tmsg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function openCfg() {
  const url = prompt('Backend URL:', BACKEND);
  if (url) { localStorage.setItem('backend', url.trim().replace(/\/$/,'')); location.reload(); }
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadPredictions();
  setTimeout(() => showToast('🏆 HandicapAI Live!'), 1000);

  // Auto-refresh every 20 minutes to catch result updates
  setInterval(() => {
    console.log('[Auto-refresh] Checking for updates...');
    loadPredictions();
  }, 20 * 60 * 1000);

  // At midnight, auto-switch to new day
  function scheduleMidnightReset() {
    const now = new Date();
    const midnight = new Date();
    midnight.setHours(24, 1, 0, 0); // 1 min past midnight
    const msUntilMidnight = midnight - now;
    setTimeout(() => {
      console.log('[Midnight] New day — refreshing...');
      S.day = 'today';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      // Today is now the 2nd tab (index 1)
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.nav-item')[1].classList.add('active');
      loadPredictions();
      scheduleMidnightReset();
    }, msUntilMidnight);
  }
  scheduleMidnightReset();
});
</script>
</body>
